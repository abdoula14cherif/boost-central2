<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SILLA — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
:root{
  --cream:#FEFCF7;--warm:#FDF6E9;--parchment:#F5EDD6;
  --gold:#B8860B;--gold-l:#D4A017;--gold-ll:#E8C060;
  --ember:#E05A2B;--deep:#1A0F00;--ink:#2D1F00;--brown:#6B4C1E;
  --muted:#9A8060;--line:rgba(184,134,11,.2);--border:rgba(184,134,11,.15);
  --shadow:rgba(90,50,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--cream);}
body{
  min-height:100vh;
  background:linear-gradient(160deg,#FEFCF7 0%,#FDF6E9 40%,#FAF0D8 100%);
  font-family:'Outfit',sans-serif;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow-x:hidden;padding:32px 0;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 75% 15%,rgba(212,160,23,.08) 0%,transparent 50%),
    radial-gradient(circle at 20% 85%,rgba(224,90,43,.04) 0%,transparent 45%);
}
.deco-line-top{position:fixed;top:0;left:0;right:0;height:3px;z-index:100;
  background:linear-gradient(90deg,transparent,var(--gold-l),var(--gold-ll),var(--gold-l),transparent);}

.wrapper{position:relative;z-index:10;width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;}

/* HEADER */
.header{padding:0 28px 36px;text-align:center;animation:fdown .8s cubic-bezier(.22,1,.36,1) both;}
.logo-wrap{display:inline-block;position:relative;margin-bottom:16px;}
.lc{position:absolute;width:10px;height:10px;border-color:var(--gold);border-style:solid;}
.lc.tl{top:-4px;left:-8px;border-width:1.5px 0 0 1.5px;}
.lc.tr{top:-4px;right:-8px;border-width:1.5px 1.5px 0 0;}
.lc.bl{bottom:-4px;left:-8px;border-width:0 0 1.5px 1.5px;}
.lc.br{bottom:-4px;right:-8px;border-width:0 1.5px 1.5px 0;}
.logo{font-family:'Cormorant Garamond',serif;font-size:3.2rem;font-weight:700;
  letter-spacing:.42em;color:var(--gold);padding:0 12px;
  text-shadow:0 2px 20px rgba(184,134,11,.15);}
.tagline{font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1rem;color:var(--brown);line-height:1.7;}

/* CARD */
.card{
  width:calc(100% - 32px);background:#fff;
  border:1px solid var(--border);border-radius:4px;
  box-shadow:0 8px 40px var(--shadow),0 1px 4px rgba(184,134,11,.06);
  overflow:hidden;position:relative;
  animation:fup .85s .1s cubic-bezier(.22,1,.36,1) both;
}
.card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold-l),transparent);}
.card-body{padding:36px 28px 32px;}

.lbl{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.lbl::after{content:'';flex:1;height:1px;background:var(--border);}

.inp{width:100%;padding:14px 16px;background:var(--warm);border:1.5px solid var(--border);
  border-radius:3px;font-family:'Outfit',sans-serif;font-size:.95rem;color:var(--ink);
  outline:none;transition:all .22s;margin-bottom:20px;-webkit-appearance:none;}
.inp:focus{border-color:var(--gold-l);background:#fff;box-shadow:0 0 0 3px rgba(184,134,11,.08);}
.inp::placeholder{color:rgba(45,31,0,.28);}
.inp.err{border-color:var(--ember);}

.forgot{text-align:right;margin-top:-14px;margin-bottom:22px;}
.forgot a{font-size:.72rem;color:var(--gold);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s;}
.forgot a:hover{border-bottom-color:var(--gold);}

.btn{width:100%;padding:16px;border:none;cursor:pointer;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold-l) 50%,var(--gold) 100%);
  background-size:200% 100%;background-position:100% 0;
  color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;border-radius:3px;
  transition:all .4s cubic-bezier(.22,1,.36,1);
  text-shadow:0 1px 3px rgba(0,0,0,.2);box-shadow:0 4px 16px rgba(184,134,11,.25);}
.btn:hover{background-position:0 0;box-shadow:0 6px 24px rgba(184,134,11,.4);transform:translateY(-1px);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

.ld{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}

.divline{display:flex;align-items:center;gap:8px;margin:20px 0;}
.dl{flex:1;height:1px;background:var(--border);}
.dt{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}

.reg{text-align:center;font-size:.8rem;color:var(--brown);}
.reg a{color:var(--gold);text-decoration:none;font-weight:600;border-bottom:1px solid transparent;transition:border-color .2s;}
.reg a:hover{border-bottom-color:var(--gold);}

/* SECURITY */
.security{
  margin-top:20px;display:flex;align-items:center;justify-content:center;gap:8px;
  animation:fup .7s .35s cubic-bezier(.22,1,.36,1) both;
}
.sec-icon{font-size:.8rem;color:var(--gold);}
.sec-txt{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}

@keyframes fdown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fup{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:#fff;border:1.5px solid var(--border);border-radius:4px;padding:11px 22px;
  font-size:.78rem;font-weight:600;color:var(--ink);z-index:999;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;box-shadow:0 8px 32px var(--shadow);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(22,163,74,.4);color:#15803D;}
.toast.err{border-color:rgba(224,90,43,.4);color:var(--ember);}
</style>
</head>
<body>
<div class="deco-line-top"></div>
<div class="toast" id="toast"></div>

<div class="wrapper">

  <div class="header">
    <div class="logo-wrap">
      <div class="lc tl"></div><div class="lc tr"></div>
      <div class="lc bl"></div><div class="lc br"></div>
      <div class="logo">SILLA</div>
    </div>
    <div class="tagline">Votre empire financier vous attend</div>
  </div>

  <div class="card">
    <div class="card-body">

      <div class="lbl">Email</div>
      <input class="inp" id="f-email" type="email" placeholder="votre@email.com" autocomplete="email" inputmode="email"/>

      <div class="lbl">Mot de passe</div>
      <input class="inp" id="f-pwd" type="password" placeholder="••••••••" autocomplete="current-password"/>

      <div class="forgot">
        <a href="silla-forgot.html">Mot de passe oublié ?</a>
      </div>

      <button class="btn" id="btn-login" onclick="login()">
        Accéder à SILLA →
      </button>

      <div class="divline">
        <div class="dl"></div>
        <div class="dt">Pas encore membre ?</div>
        <div class="dl"></div>
      </div>

      <div class="reg">
        <a href="silla-inscription.html">Créer un compte gratuitement →</a>
      </div>

    </div>
  </div>

  <div class="security">
    <div class="sec-icon">🔒</div>
    <div class="sec-txt">Connexion sécurisée · Données chiffrées</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://pnybmieunidegpxwkodn.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueWJtaWV1bmlkZWdweHdrb2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NzQxNjcsImV4cCI6MjA5MjE1MDE2N30.nB7sZDP5_ObxvW112LlrhS788_xdUoAVFnsFmPrXUsY'
);

function toast(m,t=''){
  const el=document.getElementById('toast');
  el.textContent=m;el.className='toast show'+(t?' '+t:'');
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.className='toast',4500);
}

async function login(){
  const email=document.getElementById('f-email').value.trim();
  const pwd=document.getElementById('f-pwd').value;

  if(!email||!pwd){ toast('⚠️ Remplissez tous les champs','err'); return; }
  if(!/\S+@\S+\.\S+/.test(email)){ toast('⚠️ Email invalide','err'); return; }

  const btn=document.getElementById('btn-login');
  btn.disabled=true; btn.innerHTML='<div class="ld"></div> Vérification...';

  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:pwd});
    if(error) throw error;

    // Vérifier statut
    const{data:p}=await sb.from('utilisateurs').select('statut,nom').eq('id',data.user.id).maybeSingle();
    if(p?.statut==='suspendu'){
      await sb.auth.signOut();
      throw new Error('Compte suspendu. Contactez le support.');
    }

    const prenom = p?.nom?.split(' ')[0] || '';
    toast('✅ Bienvenue '+(prenom?prenom+'  ':'')+'!','ok');
    setTimeout(()=>window.location.href='silla-dashboard.html',1400);

  }catch(e){
    btn.disabled=false; btn.innerHTML='Accéder à SILLA →';
    const m=e.message?.includes('Invalid login')||e.message?.includes('invalid_credentials')
      ? 'Email ou mot de passe incorrect'
      : e.message?.includes('Email not confirmed')
      ? 'Confirmez votre email d\'abord'
      : e.message||'Erreur de connexion';
    toast('❌ '+m,'err');
    document.getElementById('f-email').classList.add('err');
    document.getElementById('f-pwd').classList.add('err');
  }
}

// Touche Entrée
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('f-pwd').addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
  document.getElementById('f-email').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('f-pwd').focus(); });
});

// PAS DE REDIRECTION AUTOMATIQUE
</script>
</body>
</html>
