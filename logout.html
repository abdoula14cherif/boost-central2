<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Déconnexion - Boost Central</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: #F8FAFC;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Lueurs d'ambiance */
        .glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
            animation: pulse 8s infinite alternate;
        }
        .glow-1 { width: 300px; height: 300px; background: rgba(255,102,0,0.18); top: -60px; left: -60px; }
        .glow-2 { width: 280px; height: 280px; background: rgba(0,102,255,0.15); bottom: -60px; right: -60px; }

        @keyframes pulse {
            0%   { opacity: 0.4; transform: scale(1); }
            100% { opacity: 0.7; transform: scale(1.1); }
        }

        /* Carte */
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 48px 36px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            border: 1px solid #E2E8F0;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(90deg, #0066FF 0%, #FF6600 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
            margin-bottom: 28px;
        }

        /* Icône */
        .icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #FFF0E6;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .icon-wrap i { font-size: 2rem; color: #FF6600; }

        /* Spinner */
        .spinner {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #E6F0FF;
            display: none;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .spinner i { font-size: 2rem; color: #0066FF; animation: spin 1s linear infinite; }

        @keyframes spin { to { transform: rotate(360deg); } }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1E293B;
            margin-bottom: 10px;
        }

        p {
            color: #475569;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        /* Boutons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 13px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            text-decoration: none;
        }

        .btn-orange {
            background: linear-gradient(90deg, #FF6600, #E65C00);
            color: white;
            box-shadow: 0 6px 18px rgba(255,102,0,0.28);
        }

        .btn-orange:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(255,102,0,0.38); }

        .btn-ghost {
            background: #F1F5F9;
            color: #475569;
        }

        .btn-ghost:hover { background: #E2E8F0; transform: translateY(-2px); }

        /* Message de statut */
        .status {
            font-size: 0.88rem;
            padding: 10px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: none;
        }

        .status.show { display: block; }
        .status.success { background: #d1fae5; color: #065f46; }
        .status.error   { background: #fee2e2; color: #991b1b; }

        @media (max-width: 480px) {
            .card { padding: 32px 20px; }
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="card">
        <div class="logo">BOOST CENTRAL</div>

        <!-- Icône (état initial) -->
        <div class="icon-wrap" id="iconWrap">
            <i class="fas fa-sign-out-alt"></i>
        </div>

        <!-- Spinner (pendant la déconnexion) -->
        <div class="spinner" id="spinner">
            <i class="fas fa-circle-notch"></i>
        </div>

        <h2 id="title">Se déconnecter ?</h2>
        <p id="subtitle">Vous êtes sur le point de vous déconnecter de votre compte Boost Central.</p>

        <div class="status" id="status"></div>

        <!-- Boutons -->
        <div id="btnGroup">
            <button class="btn btn-orange" id="btnConfirm">
                <i class="fas fa-sign-out-alt"></i> Oui, me déconnecter
            </button>
            <a href="dashboard.html" class="btn btn-ghost">
                <i class="fas fa-arrow-left"></i> Retour au dashboard
            </a>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        var SUPABASE_URL  = 'https://mutdtyifvcrkiouudwhr.supabase.co';
        var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11dGR0eWlmdmNya2lvdXVkd2hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODEwODcsImV4cCI6MjA4OTU1NzA4N30.l08pEalpQ50QN4xVuDp5hyan7hwXprHOeCo0nrCA4vU';

        var sb = null;
        try {
            if (window.supabase && window.supabase.createClient) {
                sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
            }
        } catch(e) {}

        document.getElementById('btnConfirm').addEventListener('click', async function() {
            // Passer en mode chargement
            document.getElementById('iconWrap').style.display = 'none';
            document.getElementById('spinner').style.display = 'flex';
            document.getElementById('btnGroup').style.display = 'none';
            document.getElementById('title').textContent = 'Déconnexion en cours...';
            document.getElementById('subtitle').textContent = 'Veuillez patienter quelques secondes.';

            try {
                if (sb) {
                    await sb.auth.signOut();
                }
                // Vider le localStorage lié à Boost Central
                localStorage.removeItem('bc_conditions_accepted');

                // Succès
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('iconWrap').style.display = 'flex';
                document.getElementById('iconWrap').style.background = '#d1fae5';
                document.getElementById('iconWrap').querySelector('i').style.color = '#059669';
                document.getElementById('iconWrap').querySelector('i').className = 'fas fa-check-circle';
                document.getElementById('title').textContent = 'Déconnecté avec succès !';
                document.getElementById('subtitle').textContent = 'Redirection vers la page de connexion...';

                var s = document.getElementById('status');
                s.className = 'status success show';
                s.textContent = '✅ Vous avez été déconnecté. À bientôt sur Boost Central !';

                setTimeout(function() {
                    window.location.href = 'auth.html';
                }, 1800);

            } catch(err) {
                // Erreur Supabase mais on redirige quand même
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('iconWrap').style.display = 'flex';
                document.getElementById('title').textContent = 'Redirection...';
                document.getElementById('subtitle').textContent = 'Une erreur mineure est survenue. Redirection en cours...';
                setTimeout(function() {
                    window.location.href = 'auth.html';
                }, 1500);
            }
        });
    </script>
</body>
</html>
