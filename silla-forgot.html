<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SILLA — Mot de passe oublié</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#FEFCF7;--warm:#FDF6E9;--card:#fff;--gold:#B8860B;--gold-l:#D4A017;--gold-dim:rgba(184,134,11,.08);--ember:#E05A2B;--green:#16A34A;--ink:#2D1F00;--brown:#6B4C1E;--muted:#9A8060;--border:rgba(184,134,11,.15);--shadow:rgba(90,50,0,.09);}
*{margin:0;padding:0;box-sizing:border-box;}
html{background:var(--cream);}
body{max-width:430px;margin:0 auto;background:linear-gradient(160deg,#FEFCF7,#FDF6E9);font-family:'Outfit',sans-serif;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;}
.deco-line-top{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold-l),var(--gold-ll, #E8C060),var(--gold-l),transparent);}
.wrapper{width:100%;max-width:420px;}
.header{text-align:center;margin-bottom:32px;}
.logo-wrap{display:inline-block;position:relative;margin-bottom:16px;}
.lc{position:absolute;width:10px;height:10px;border-color:var(--gold);border-style:solid;}
.lc.tl{top:-4px;left:-8px;border-width:1.5px 0 0 1.5px;}
.lc.tr{top:-4px;right:-8px;border-width:1.5px 1.5px 0 0;}
.lc.bl{bottom:-4px;left:-8px;border-width:0 0 1.5px 1.5px;}
.lc.br{bottom:-4px;right:-8px;border-width:0 1.5px 1.5px 0;}
.logo{font-family:'Cormorant Garamond',serif;font-size:2.8rem;font-weight:700;letter-spacing:.4em;color:var(--gold);padding:0 12px;}
.header-sub{font-size:.88rem;color:var(--brown);line-height:1.6;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 4px 24px var(--shadow);position:relative;}
.card::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--gold-l),transparent);}
.card-body{padding:28px 24px;}
.lbl{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.lbl::after{content:'';flex:1;height:1px;background:rgba(184,134,11,.1);}
.inp{width:100%;padding:13px 16px;background:var(--warm);border:1.5px solid var(--border);border-radius:3px;font-family:'Outfit',sans-serif;font-size:.92rem;color:var(--ink);outline:none;transition:all .22s;margin-bottom:20px;-webkit-appearance:none;}
.inp:focus{border-color:var(--gold-l);background:#fff;box-shadow:0 0 0 3px rgba(184,134,11,.08);}
.inp::placeholder{color:rgba(45,31,0,.25);}
.btn{width:100%;padding:15px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;box-shadow:0 4px 14px rgba(184,134,11,.22);transition:all .4s;margin-bottom:14px;}
.btn:hover{box-shadow:0 6px 20px rgba(184,134,11,.35);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.ld{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
.back-link{text-align:center;font-size:.8rem;color:var(--muted);margin-top:16px;}
.back-link a{color:var(--gold);text-decoration:none;font-weight:600;}
.success-msg{background:rgba(22,163,74,.06);border:1px solid rgba(22,163,74,.2);border-radius:10px;padding:14px 16px;font-size:.78rem;color:var(--green);line-height:1.7;display:none;margin-bottom:14px;}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#fff;border:1.5px solid var(--border);border-radius:4px;padding:10px 20px;font-size:.78rem;font-weight:600;color:var(--ink);z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 32px var(--shadow);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(22,163,74,.4);color:#15803D;}
.toast.err{border-color:rgba(224,90,43,.4);color:var(--ember);}
</style>
</head>
<body>
<div class="deco-line-top"></div>
<div class="toast" id="toast"></div>

<div class="wrapper">
  <div class="header">
    <div class="logo-wrap">
      <div class="lc tl"></div><div class="lc tr"></div>
      <div class="lc bl"></div><div class="lc br"></div>
      <div class="logo">SILLA</div>
    </div>
    <div class="header-sub">Réinitialisez votre mot de passe<br>en quelques secondes</div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="success-msg" id="success-msg">
        ✅ Un email de réinitialisation a été envoyé à votre adresse. Vérifiez votre boîte mail (et les spams).
      </div>
      <div class="lbl">Votre adresse email</div>
      <input class="inp" id="f-email" type="email" placeholder="votre@email.com" inputmode="email" autocomplete="email"/>
      <button class="btn" id="btn-reset" onclick="resetPassword()">Recevoir le lien →</button>
    </div>
  </div>

  <div class="back-link">
    <a href="silla-login.html">← Retour à la connexion</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb=supabase.createClient('https://pnybmieunidegpxwkodn.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueWJtaWV1bmlkZWdweHdrb2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NzQxNjcsImV4cCI6MjA5MjE1MDE2N30.nB7sZDP5_ObxvW112LlrhS788_xdUoAVFnsFmPrXUsY');

function toast(m,t=''){const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(t?' '+t:'');clearTimeout(toast._t);toast._t=setTimeout(()=>el.className='toast',4500);}

async function resetPassword(){
  const email=document.getElementById('f-email').value.trim();
  if(!email||!/\S+@\S+\.\S+/.test(email)){toast('⚠️ Email invalide','err');return;}
  const btn=document.getElementById('btn-reset');
  btn.disabled=true;btn.innerHTML='<div class="ld"></div> Envoi...';
  try{
    const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/silla-login.html'});
    if(error) throw error;
    document.getElementById('success-msg').style.display='block';
    document.getElementById('f-email').style.display='none';
    btn.style.display='none';
    toast('✅ Email envoyé !','ok');
  }catch(e){
    btn.disabled=false;btn.innerHTML='Recevoir le lien →';
    toast('❌ '+(e.message?.includes('not found')?'Aucun compte avec cet email':e.message),'err');
  }
}

document.getElementById('f-email').addEventListener('keydown',e=>{if(e.key==='Enter')resetPassword();});
</script>
</body>
</html>
