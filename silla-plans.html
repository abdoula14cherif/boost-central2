<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SILLA — Plans d'investissement</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --blue:#1A3FE3;--blue2:#2D55FF;--blue-dark:#0B1225;
  --orange:#FF6B1A;--orange-l:#FF8C42;--turq:#00C2B7;--green:#00C271;
  --bg:#F0F4FF;--white:#fff;--dark:#080E2A;--gray:#8892A8;
  --border:#DDE3F5;--red:#E83030;--gold:#F5B731;--nav-h:70px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--dark);}
body{display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{background:var(--blue-dark);height:58px;padding:0 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:80;box-shadow:0 2px 16px rgba(8,14,42,.3);}
.back-btn{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);font-size:1.1rem;cursor:pointer;text-decoration:none;}
.top-logo{font-family:'Clash Display',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:2px;color:#fff;}
.top-logo span{color:var(--orange);}
.solde-chip{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:.28rem .8rem;font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.6);}
.solde-chip strong{color:var(--gold);}

/* HERO */
.hero-band{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 55%,var(--turq) 100%);padding:1.2rem 1.2rem 1rem;position:relative;overflow:hidden;}
.hero-band::after{content:'🚀';position:absolute;right:-5px;top:-5px;font-size:5rem;opacity:.08;}
.hero-ttl{font-family:'Clash Display',sans-serif;font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:.25rem;}
.hero-sub{font-size:.75rem;color:rgba(255,255,255,.7);line-height:1.5;}
.steps{display:flex;align-items:center;margin-top:.9rem;}
.st{display:flex;flex-direction:column;align-items:center;gap:.18rem;}
.st-dot{width:24px;height:24px;border-radius:50%;font-size:.65rem;font-weight:800;display:flex;align-items:center;justify-content:center;}
.st-dot.done{background:rgba(255,255,255,.2);color:#fff;}
.st-dot.active{background:#fff;color:var(--blue);}
.st-dot.inactive{background:rgba(255,255,255,.08);color:rgba(255,255,255,.35);}
.st-lbl{font-size:.52rem;font-weight:700;color:rgba(255,255,255,.55);}
.st-lbl.active{color:#fff;}
.st-line{width:26px;height:2px;background:rgba(255,255,255,.18);margin-bottom:12px;}
.st-line.done{background:rgba(255,255,255,.45);}

/* BONUS BANNER */
.bonus-banner{background:linear-gradient(135deg,#1A0A00,#2D1500);border-bottom:1px solid rgba(245,183,49,.18);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;}
.bb-ico{font-size:1.3rem;}
.bb-txt{flex:1;font-size:.72rem;color:rgba(245,183,49,.65);line-height:1.45;}
.bb-txt strong{color:var(--gold);}
.bb-amt{font-family:'Clash Display',sans-serif;font-size:1.1rem;font-weight:700;color:var(--gold);}

/* FILTRES */
.filter-wrap{padding:.7rem 1rem .3rem;background:var(--white);border-bottom:1px solid var(--border);}
.filter-row{display:flex;gap:.4rem;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.fbtn{padding:.38rem .85rem;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);font-size:.7rem;font-weight:700;color:var(--gray);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .18s;}
.fbtn.active{background:var(--blue);border-color:var(--blue);color:#fff;}

/* CONTENT */
.content{flex:1;padding:.9rem 1rem calc(var(--nav-h)+1rem);max-width:480px;margin:0 auto;width:100%;}

/* SEC LABEL */
.sec-lbl{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);margin:.6rem 0 .7rem;display:flex;align-items:center;gap:.5rem;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── PLAN CARD ── */
.plan-card{background:var(--white);border-radius:20px;border:1.5px solid var(--border);margin-bottom:.85rem;overflow:hidden;box-shadow:0 3px 14px rgba(27,63,228,.06);transition:all .25s;cursor:pointer;position:relative;}
.plan-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(27,63,228,.13);}
.plan-card:active{transform:scale(.98);}
.plan-card.selected{border-color:var(--orange);}
.plan-card.locked{cursor:not-allowed;}
.plan-card.locked:hover{transform:none;box-shadow:0 3px 14px rgba(27,63,228,.06);}

/* LOCK OVERLAY */
.lock-ov{position:absolute;inset:0;background:rgba(8,14,42,.6);backdrop-filter:blur(3px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;border-radius:18px;z-index:5;}
.lock-ov .l-ico{font-size:2.2rem;}
.lock-ov .l-txt{font-size:.82rem;font-weight:800;color:#fff;}
.lock-ov .l-sub{font-size:.68rem;color:rgba(255,255,255,.5);}

/* IMAGE SECTION */
.plan-img{height:150px;width:100%;overflow:hidden;position:relative;}
.plan-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.plan-card:hover .plan-img img{transform:scale(1.05);}
.plan-img-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(8,14,42,.55) 100%);}
.plan-img-badge{position:absolute;top:.6rem;left:.6rem;background:rgba(8,14,42,.7);backdrop-filter:blur(8px);border-radius:8px;padding:.25rem .65rem;font-size:.65rem;font-weight:700;color:#fff;border:1px solid rgba(255,255,255,.15);}
.plan-img-gain{position:absolute;bottom:.6rem;right:.6rem;background:linear-gradient(135deg,var(--green),var(--turq));border-radius:8px;padding:.28rem .7rem;font-family:'Clash Display',sans-serif;font-size:.85rem;font-weight:700;color:#fff;}
.plan-img-fav{position:absolute;top:.6rem;right:.6rem;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:.85rem;}

/* PLAN BODY */
.plan-body{padding:.9rem 1rem;}
.plan-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
.plan-title-row{display:flex;align-items:center;gap:.55rem;}
.plan-ico{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.plan-name{font-family:'Clash Display',sans-serif;font-size:.95rem;font-weight:700;color:var(--dark);}
.plan-dur-lbl{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--gray);margin-top:.08rem;}
.plan-tag{font-size:.6rem;font-weight:800;padding:.2rem .55rem;border-radius:99px;}

/* MONTANTS ROW */
.plan-mnt-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;margin-bottom:.75rem;}
.pm{background:var(--bg);border-radius:10px;padding:.6rem .5rem;text-align:center;}
.pm-val{font-family:'Clash Display',sans-serif;font-size:.92rem;font-weight:700;line-height:1;}
.pm-lbl{font-size:.55rem;color:var(--gray);margin-top:.18rem;font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;}

/* PROGRESS */
.plan-prog{margin-bottom:.75rem;}
.pp-top{display:flex;justify-content:space-between;font-size:.65rem;color:var(--gray);margin-bottom:.35rem;}
.pp-top span:last-child{font-weight:700;}
.pp-track{height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.pp-fill{height:100%;border-radius:99px;transition:width 1s ease;}

/* TOTAL */
.plan-total{display:flex;align-items:center;justify-content:space-between;padding:.65rem .85rem;border-radius:12px;margin-bottom:.8rem;}
.pt-lbl{font-size:.73rem;color:var(--gray);}
.pt-val{font-family:'Clash Display',sans-serif;font-size:1.1rem;font-weight:700;}

/* BTN */
.plan-btn{width:100%;padding:.82rem;background:linear-gradient(135deg,var(--orange),var(--orange-l));border:none;border-radius:13px;color:#fff;font-size:.85rem;font-weight:800;cursor:pointer;transition:all .22s;box-shadow:0 5px 16px rgba(255,107,26,.25);display:flex;align-items:center;justify-content:center;gap:.45rem;}
.plan-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(255,107,26,.35);}
.plan-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(8,14,42,.55);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-bg.open{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:1.3rem 1.2rem 2.8rem;animation:slideUp .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{width:38px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 1.2rem;}
.mttl{font-family:'Clash Display',sans-serif;font-size:1.05rem;font-weight:700;color:var(--dark);margin-bottom:.35rem;}
.msub{font-size:.76rem;color:var(--gray);margin-bottom:1.1rem;line-height:1.55;}

/* RECAP */
.recap{border-radius:16px;padding:1.1rem;margin-bottom:1rem;position:relative;overflow:hidden;}
.recap-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
.rg{padding:.6rem .7rem;background:rgba(255,255,255,.1);border-radius:10px;}
.rg-l{font-size:.56rem;color:rgba(255,255,255,.38);font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.18rem;}
.rg-v{font-family:'Clash Display',sans-serif;font-size:.95rem;font-weight:700;color:#fff;}
.rg-v.g{color:#4DFFB4;}
.rg-v.gold{color:var(--gold);}

.info-box{background:rgba(27,63,228,.05);border:1px solid rgba(27,63,228,.12);border-radius:11px;padding:.75rem .9rem;font-size:.74rem;color:var(--blue);line-height:1.7;margin-bottom:.9rem;}
.info-box.warn{background:rgba(232,48,48,.05);border-color:rgba(232,48,48,.15);color:var(--red);}
.mbtn{width:100%;padding:.9rem;border:none;border-radius:13px;color:#fff;font-size:.88rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem;transition:all .2s;}
.mbtn.orange{background:linear-gradient(135deg,var(--orange),var(--orange-l));box-shadow:0 5px 16px rgba(255,107,26,.25);}
.mbtn.blue{background:linear-gradient(135deg,var(--blue),var(--blue2));box-shadow:0 5px 16px rgba(27,63,228,.22);}
.mbtn:hover{transform:translateY(-1px);}
.mbtn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--white);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:0 .4rem;z-index:90;box-shadow:0 -4px 20px rgba(8,14,42,.07);}
.nb{display:flex;flex-direction:column;align-items:center;gap:.2rem;padding:.5rem .6rem;border:none;background:none;cursor:pointer;border-radius:12px;min-width:52px;text-decoration:none;color:var(--gray);}
.nb.active{color:var(--blue2);}
.nb-i{font-size:1.25rem;line-height:1;}
.nb-l{font-size:.58rem;font-weight:700;}
.nb-c{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange-l));display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(255,107,26,.4);margin-bottom:8px;}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--dark);color:#fff;padding:.7rem 1.2rem;border-radius:14px;font-size:.78rem;font-weight:600;opacity:0;transition:all .32s;pointer-events:none;z-index:999;border-left:3px solid var(--turq);box-shadow:0 8px 24px rgba(8,14,42,.25);max-width:88vw;text-align:center;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.success{border-color:var(--green);}
#toast.error{border-color:var(--red);}
#toast.warning{border-color:var(--gold);}
@keyframes fadeU{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

async function init(){
  const{data}=await sb.auth.getSession();
  if(!data?.session){window.location.href='silla-login.html';return;}
  U=data.session.user;
  const{data:p}=await sb.from('utilisateurs').select('*').eq('id',U.id).maybeSingle();
  if(p){profile=p;solde=p.solde||0;}
  document.getElementById('topSolde').textContent=fmt(solde);
  if(p&&!p.bonus_utilise)document.getElementById('bonusBanner').style.display='flex';
  renderPlans();
}

function filterPlans(cat,btn){
  filtreActif=cat;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPlans();
}

function renderPlans(){
  const filtered=filtreActif==='tous'?PLANS:PLANS.filter(p=>p.cat===filtreActif);
  const cats={starter:'🌱 Plans Starter',premium:'⭐ Plans Premium',elite:'💎 Plans Élite'};
  let html='',lastCat='';

  filtered.forEach((plan,i)=>{
    if(plan.cat!==lastCat){
      html+=`<div class="sec-lbl" style="animation-delay:${i*.05}s">${cats[plan.cat]||''}</div>`;
      lastCat=plan.cat;
    }
    const totalGain=plan.gain_jour*plan.jours;
    const pct=Math.round(plan.gain_jour/plan.montant*100);

    html+=`
    <div class="plan-card ${plan.locked?'locked':''}" style="animation:fadeU .4s ${i*.07}s ease both" onclick="${plan.locked?'showLocked()':'openConfirm(\''+plan.id+'\')'}">
      ${plan.locked?`<div class="lock-ov"><div class="l-ico">🔒</div><div class="l-txt">Plan Bloqué</div><div class="l-sub">Bientôt disponible</div></div>`:''}
      
      <div class="plan-img">
        <img src="${TECH_IMGS[plan.img]}" alt="${plan.nom}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1518770660439-4636190af475?w=600&q=80'"/>
        <div class="plan-img-overlay"></div>
        <div class="plan-img-badge">${plan.emoji} ${plan.nom}</div>
        <div class="plan-img-gain">+${fmt(plan.gain_jour)} F/j</div>
        <div class="plan-img-fav">🤍</div>
      </div>

      <div class="plan-body">
        <div class="plan-head">
          <div class="plan-title-row">
            <div class="plan-ico" style="background:${plan.bg}">${plan.emoji}</div>
            <div>
              <div class="plan-name">${plan.nom}</div>
              <div class="plan-dur-lbl">⏱ ${plan.jours} jours · Gain quotidien</div>
            </div>
          </div>
          <span class="plan-tag" style="background:${plan.tag_bg};color:${plan.tag_c}">${plan.tag}</span>
        </div>

        <div class="plan-mnt-row">
          <div class="pm">
            <div class="pm-val" style="color:${plan.couleur}">${fmt(plan.montant)}</div>
            <div class="pm-lbl">Mise (F)</div>
          </div>
          <div class="pm">
            <div class="pm-val" style="color:var(--green)">+${fmt(plan.gain_jour)}</div>
            <div class="pm-lbl">/ Jour (F)</div>
          </div>
          <div class="pm">
            <div class="pm-val" style="color:var(--dark)">${plan.jours}j</div>
            <div class="pm-lbl">Durée</div>
          </div>
        </div>

        <div class="plan-prog">
          <div class="pp-top"><span>Rendement journalier</span><span style="color:${plan.couleur}">+${pct}% / jour</span></div>
          <div class="pp-track"><div class="pp-fill" style="width:${Math.min(pct*4,100)}%;background:${plan.gradient}"></div></div>
        </div>

        <div class="plan-total" style="background:${plan.bg}">
          <div class="pt-lbl">💰 Gain total sur ${plan.jours} jours</div>
          <div class="pt-val" style="color:${plan.couleur}">+${fmt(totalGain)} F</div>
        </div>

        ${!plan.locked?`
        <button class="plan-btn" onclick="event.stopPropagation();openConfirm('${plan.id}')">🚀 Choisir ce plan</button>
        `:`
        <button class="plan-btn" style="background:rgba(8,14,42,.15);box-shadow:none;cursor:not-allowed" disabled>🔒 Plan bloqué</button>
        `}
      </div>
    </div>`;
  });
  document.getElementById('plans-container').innerHTML=html;
}

function openConfirm(planId){
  selPlan=PLANS.find(p=>p.id===planId);
  if(!selPlan||selPlan.locked)return;
  const totalGain=selPlan.gain_jour*selPlan.jours;
  const manque=selPlan.montant-solde;
  const soldeOk=solde>=selPlan.montant;

  document.getElementById('modal-inner').innerHTML=`
    <div class="mttl">${selPlan.emoji} ${selPlan.nom}</div>
    <div class="msub">Confirmez votre investissement</div>

    <div class="recap" style="background:${selPlan.gradient}">
      <div style="font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:.5rem">Récapitulatif</div>
      <div class="recap-grid">
        <div class="rg"><div class="rg-l">Investissement</div><div class="rg-v">${fmt(selPlan.montant)} F</div></div>
        <div class="rg"><div class="rg-l">Gain/Jour</div><div class="rg-v g">+${fmt(selPlan.gain_jour)} F</div></div>
        <div class="rg"><div class="rg-l">Durée</div><div class="rg-v">${selPlan.jours} jours</div></div>
        <div class="rg"><div class="rg-l">Gain total</div><div class="rg-v gold">+${fmt(totalGain)} F</div></div>
      </div>
    </div>

    ${!soldeOk?`
    <div class="info-box warn">
      ⚠️ Solde insuffisant. Il vous manque <strong>${fmt(manque)} FCFA</strong>.<br>
      Rechargez votre compte pour continuer.
    </div>
    <button class="mbtn orange" onclick="closeM();window.location.href='silla-recharge.html'">💳 Recharger mon compte</button>
    `:`
    <div class="info-box">
      ✅ Solde disponible : <strong>${fmt(solde)} FCFA</strong><br>
      Après investissement : <strong>${fmt(solde-selPlan.montant)} FCFA</strong> restants.<br>
      Votre 1er gain de <strong>+${fmt(selPlan.gain_jour)} F</strong> sera disponible dans <strong>24h</strong>.
    </div>
    <button class="mbtn orange" id="conf-btn" onclick="confirmer()">🚀 Confirmer et investir</button>
    `}
    <button style="width:100%;margin-top:.6rem;padding:.8rem;background:transparent;border:1.5px solid var(--border);border-radius:13px;color:var(--gray);font-size:.82rem;font-weight:700;cursor:pointer;" onclick="closeM()">Annuler</button>
  `;
  document.getElementById('modal-ok').classList.add('open');
}

function closeM(){document.getElementById('modal-ok').classList.remove('open');}
function showLocked(){showToast('🔒 Ce plan sera disponible prochainement','warning');}

async function confirmer(){
  if(!selPlan||solde<selPlan.montant)return;
  const btn=document.getElementById('conf-btn');
  if(!btn)return;
  btn.disabled=true;
  btn.innerHTML='<div class="spin"></div><span>Traitement…</span>';

  try{
    const now=new Date();
    const fin=new Date(now.getTime()+24*3600000);
    const nvSolde=solde-selPlan.montant;

    await sb.from('utilisateurs').update({
      solde:nvSolde,
      total_investi:(profile?.total_investi||0)+selPlan.montant,
      bonus_utilise:true
    }).eq('id',U.id);

    await sb.from('investissements').insert({
      user_id:U.id,plan_type:selPlan.id,montant:selPlan.montant,
      taux:selPlan.gain_jour/selPlan.montant*100,
      gain_attendu:selPlan.gain_jour,duree_jours:selPlan.jours,
      statut:'actif',date_debut:now.toISOString(),date_fin:fin.toISOString()
    });

    await sb.from('transactions').insert({
      user_id:U.id,type:'investissement',montant:selPlan.montant,
      description:`Plan ${selPlan.nom} · +${fmt(selPlan.gain_jour)} F/jour × ${selPlan.jours} jours`
    });

    await sb.from('notifications').insert({
      user_id:U.id,titre:'📈 Plan activé !',
      message:`Plan ${selPlan.nom} activé. +${fmt(selPlan.gain_jour)} FCFA disponibles dans 24h.`,type:'gain'
    });

    solde=nvSolde;
    closeM();
    showToast(`✅ Plan ${selPlan.nom} activé !`,'success');
    setTimeout(()=>window.location.href='silla-dashboard.html',1600);
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML='🚀 Confirmer et investir';}
    showToast('❌ '+e.message,'error');
  }
}

function showToast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show '+(type||'');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>el.className='',4000);
}

init();
</script>
</body>
</html>
