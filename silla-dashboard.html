<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SILLA — Accueil</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#FEFCF7;--warm:#FDF6E9;--card:#fff;--gold:#B8860B;--gold-l:#D4A017;--gold-ll:#E8C060;--gold-dim:rgba(184,134,11,.08);--ember:#E05A2B;--green:#16A34A;--ink:#2D1F00;--brown:#6B4C1E;--muted:#9A8060;--border:rgba(184,134,11,.15);--shadow:rgba(90,50,0,.09);--nav:66px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{background:var(--cream);}
body{max-width:430px;margin:0 auto;background:linear-gradient(180deg,#FEFCF7,#FDF6E9);font-family:'Outfit',sans-serif;color:var(--ink);min-height:100vh;overflow-x:hidden;}
.topbar{position:sticky;top:0;z-index:90;background:rgba(254,252,247,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.tb-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:700;letter-spacing:.3em;color:var(--gold);}
.tb-right{display:flex;align-items:center;gap:10px;}
.tb-notif{width:36px;height:36px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;position:relative;outline:none;}
.notif-dot{
  position:absolute;top:-3px;right:-3px;
  min-width:17px;height:17px;padding:0 3px;
  border-radius:9px;background:var(--ember);
  color:#fff;font-size:.52rem;font-weight:900;
  border:2px solid var(--cream);
  display:none;align-items:center;justify-content:center;
  font-family:'Outfit',sans-serif;line-height:1;
}
.tb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-ll));display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#fff;cursor:pointer;}
.scroll{padding:0 0 calc(var(--nav)+40px);}

/* HERO */
.hero{margin:16px 16px 0;border-radius:16px;overflow:hidden;position:relative;background:linear-gradient(135deg,#1A0F00,#3D2200,#1A0F00);padding:28px 24px;box-shadow:0 8px 32px rgba(90,50,0,.25);}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.25em;color:rgba(232,192,96,.6);text-transform:uppercase;margin-bottom:8px;}
.hero-solde{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:700;color:#E8C060;line-height:1;margin-bottom:4px;}
.hero-currency{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.15em;color:rgba(232,192,96,.5);margin-bottom:20px;}
/* BOUTONS HERO — boutons vrais pas des <a> */
.hero-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ha{padding:13px 12px;border-radius:10px;text-align:center;cursor:pointer;transition:transform .15s;display:flex;flex-direction:column;align-items:center;gap:6px;border:none;font-family:'Outfit',sans-serif;outline:none;-webkit-tap-highlight-color:transparent;width:100%;}
.ha.recharge{background:rgba(232,192,96,.18);border:1px solid rgba(232,192,96,.3);}
.ha.retrait{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);}
.ha:active{transform:scale(.94);}
.ha-ico{font-size:1.4rem;line-height:1;}
.ha-lbl{font-size:.68rem;font-weight:700;letter-spacing:.04em;color:rgba(232,192,96,.85);}
.hero-bonus{position:absolute;top:14px;right:14px;background:rgba(224,90,43,.2);border:1px solid rgba(224,90,43,.35);border-radius:20px;padding:4px 10px;font-size:.58rem;font-weight:700;color:#F5A882;display:none;}

/* STATS */
.qstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 16px 0;}
.qs{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 2px 8px var(--shadow);}
.qs-val{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--gold);line-height:1;}
.qs-lbl{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* SEC TITLE */
.sec{display:flex;align-items:center;gap:10px;padding:18px 16px 10px;}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:var(--ink);}
.sec-line{flex:1;height:1px;background:var(--border);}
.sec-more{font-size:.7rem;color:var(--gold);text-decoration:none;font-weight:600;}

/* QUICK MENU */
.qmenu{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 16px;}
.qm{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 6px;text-align:center;cursor:pointer;text-decoration:none;transition:all .18s;box-shadow:0 2px 8px var(--shadow);}
.qm:active{transform:scale(.93);}
.qm-ico{font-size:1.3rem;margin-bottom:5px;}
.qm-lbl{font-size:.58rem;font-weight:700;color:var(--brown);}

/* PLAN CARD */
.plan-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:0 2px 10px var(--shadow);display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.plan-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--gold-ll));}
.pc-ico{width:40px;height:40px;border-radius:10px;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.pc-info{flex:1;min-width:0;}
.pc-name{font-size:.82rem;font-weight:700;color:var(--ink);}
.pc-sub{font-size:.62rem;color:var(--muted);margin-top:2px;}
.prog-bar{height:3px;background:rgba(184,134,11,.1);border-radius:2px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold-ll));}
.pc-right{text-align:right;flex-shrink:0;}
.pc-gain{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--green);}
.pc-status{font-size:.58rem;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:3px;display:inline-block;}
.s-actif{background:rgba(22,163,74,.1);color:#15803D;}
.s-dispo{background:rgba(224,90,43,.1);color:var(--ember);}

/* NOTIF */
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid rgba(184,134,11,.07);}
.notif-item:last-child{border-bottom:none;}
.ni-ico{width:34px;height:34px;border-radius:10px;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;margin-top:1px;}
.ni-info{flex:1;}
.ni-title{font-size:.78rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:6px;}
.ni-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.ni-sub{font-size:.68rem;color:var(--muted);margin-top:3px;line-height:1.5;}
.ni-time{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);margin-top:4px;}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:.78rem;}
.empty-ico{font-size:1.8rem;opacity:.3;display:block;margin-bottom:8px;}

/* NAV */
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav);background:rgba(254,252,247,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;z-index:90;box-shadow:0 -4px 20px rgba(90,50,0,.07);}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:8px 4px;text-decoration:none;cursor:pointer;border:none;background:none;}
.bn-ico{font-size:1.2rem;line-height:1;}
.bn-lbl{font-size:.55rem;font-weight:700;color:var(--muted);}
.bn.active .bn-lbl{color:var(--gold);}
.bn-center{width:52px;height:52px;border-radius:50%;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--gold-ll));display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 16px rgba(184,134,11,.35);border:none;cursor:pointer;outline:none;}

/* ── PANNEAU NOTIFICATIONS ── */
.notif-panel{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;height:100vh;
  z-index:200;pointer-events:none;
}
.notif-overlay{
  position:absolute;inset:0;background:rgba(26,15,0,.45);
  backdrop-filter:blur(2px);opacity:0;transition:opacity .25s;pointer-events:none;
}
.notif-drawer{
  position:absolute;top:58px;right:12px;width:300px;
  background:#fff;border:1px solid var(--border);border-radius:16px;
  box-shadow:0 12px 40px rgba(90,50,0,.18);
  transform:translateY(-14px) scale(.96);opacity:0;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .2s;
  overflow:hidden;pointer-events:none;max-height:70vh;
}
.notif-panel.open{pointer-events:all;}
.notif-panel.open .notif-overlay{opacity:1;pointer-events:all;}
.notif-panel.open .notif-drawer{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
.nd-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--border);}
.nd-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--ink);}
.nd-clear{font-size:.65rem;font-weight:700;color:var(--gold);cursor:pointer;border:none;background:none;font-family:'Outfit',sans-serif;}
.nd-list{overflow-y:auto;max-height:calc(70vh - 52px);}
.nd-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(184,134,11,.07);transition:background .15s;}
.nd-item:last-child{border-bottom:none;}
.nd-item.unread{background:rgba(184,134,11,.04);}
.nd-ico{width:32px;height:32px;border-radius:9px;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;margin-top:1px;}
.nd-info{flex:1;min-width:0;}
.nd-name{font-size:.76rem;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:5px;}
.nd-dot{width:6px;height:6px;border-radius:50%;background:var(--ember);flex-shrink:0;}
.nd-msg{font-size:.65rem;color:var(--muted);margin-top:2px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.nd-time{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--muted);margin-top:3px;}
.nd-empty{text-align:center;padding:28px 16px;color:var(--muted);font-size:.76rem;}
.nd-empty-ico{font-size:1.8rem;opacity:.25;display:block;margin-bottom:8px;}

.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);background:#fff;border:1.5px solid var(--border);border-radius:4px;padding:10px 20px;font-size:.78rem;font-weight:600;color:var(--ink);z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 32px var(--shadow);pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(22,163,74,.4);color:#15803D;}
.toast.err{border-color:rgba(224,90,43,.4);color:var(--ember);}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-logo">SILLA</div>
  <div class="tb-right">
    <button class="tb-notif" id="notif-btn" onclick="toggleNotifPanel()">
      🔔
      <div class="notif-dot" id="notif-dot"></div>
    </button>
    <div class="tb-avatar" id="tb-avatar" onclick="window.location.href='silla-profil.html'">?</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- PANNEAU NOTIFICATIONS -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-overlay" onclick="closeNotifPanel()"></div>
  <div class="notif-drawer" id="notif-drawer">
    <div class="nd-head">
      <div class="nd-title">🔔 Notifications</div>
      <button class="nd-clear" onclick="marquerToutesLues()">Tout marquer lu</button>
    </div>
    <div class="nd-list" id="nd-list">
      <div class="nd-empty"><span class="nd-empty-ico">🔔</span>Aucune notification</div>
    </div>
  </div>
</div>

<div class="scroll">

  <div class="hero">
    <div class="hero-bonus" id="hero-bonus">🎁 Bonus bienvenue</div>
    <div class="hero-eyebrow">Solde disponible</div>
    <div class="hero-solde" id="hero-solde">— F</div>
    <div class="hero-currency">FRANCS CFA · XAF</div>
    <!-- BOUTONS : vrais <button> avec onclick direct -->
    <div class="hero-actions">
      <button class="ha recharge" onclick="window.location.href='silla-recharge.html'">
        <div class="ha-ico">💳</div>
        <div class="ha-lbl">Recharger</div>
      </button>
      <button class="ha retrait" onclick="window.location.href='silla-retrait.html'">
        <div class="ha-ico">💸</div>
        <div class="ha-lbl">Retirer</div>
      </button>
    </div>
  </div>

  <div class="qstats">
    <div class="qs"><div class="qs-val" id="qs-invests">—</div><div class="qs-lbl">Plans actifs</div></div>
    <div class="qs"><div class="qs-val" id="qs-gains">—</div><div class="qs-lbl">Gains totaux</div></div>
    <div class="qs"><div class="qs-val" id="qs-filleuls">—</div><div class="qs-lbl">Filleuls</div></div>
  </div>

  <div class="sec"><div class="sec-title">Actions rapides</div><div class="sec-line"></div></div>
  <div class="qmenu">
    <a class="qm" href="silla-plans.html"><div class="qm-ico">📈</div><div class="qm-lbl">Investir</div></a>
    <a class="qm" href="silla-smart.html"><div class="qm-ico">🤖</div><div class="qm-lbl">Smart</div></a>
    <a class="qm" href="silla-parrain.html"><div class="qm-ico">👑</div><div class="qm-lbl">Parrainer</div></a>
    <a class="qm" href="silla-profil.html"><div class="qm-ico">👤</div><div class="qm-lbl">Profil</div></a>
  </div>

  <div class="sec">
    <div class="sec-title">Mes investissements</div>
    <div class="sec-line"></div>
    <a class="sec-more" href="silla-plans.html">Tout voir</a>
  </div>
  <div id="plans-list">
    <div class="empty"><span class="empty-ico">📈</span>Aucun investissement actif</div>
  </div>



</div>

<div class="botnav">
  <a class="bn active" href="silla-dashboard.html"><span class="bn-ico">🏠</span><span class="bn-lbl">Accueil</span></a>
  <a class="bn" href="silla-plans.html"><span class="bn-ico">📈</span><span class="bn-lbl">Plans</span></a>
  <button class="bn-center" onclick="window.location.href='silla-recharge.html'">💳</button>
  <a class="bn" href="silla-smart.html"><span class="bn-ico">🤖</span><span class="bn-lbl">Smart</span></a>
  <a class="bn" href="silla-profil.html"><span class="bn-ico">👤</span><span class="bn-lbl">Profil</span></a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://pnybmieunidegpxwkodn.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueWJtaWV1bmlkZWdweHdrb2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NzQxNjcsImV4cCI6MjA5MjE1MDE2N30.nB7sZDP5_ObxvW112LlrhS788_xdUoAVFnsFmPrXUsY'
);
const fmt = n => Number(n||0).toLocaleString('fr-FR');
const fmtK = n => n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'k':fmt(n);
let U = null, P = null;

function toast(m,t=''){const el=document.getElementById('toast');el.textContent=m;el.className='toast show'+(t?' '+t:'');clearTimeout(toast._t);toast._t=setTimeout(()=>el.className='toast',4000);}

// ── PANNEAU NOTIFICATIONS ──
let notifOpen=false;
function toggleNotifPanel(){
  notifOpen?closeNotifPanel():openNotifPanel();
}
function openNotifPanel(){
  notifOpen=true;
  document.getElementById('notif-panel').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeNotifPanel(){
  notifOpen=false;
  document.getElementById('notif-panel').classList.remove('open');
  document.body.style.overflow='';
  // Masquer le badge quand on ferme
  document.getElementById('notif-dot').style.display='none';
}
async function marquerToutesLues(){
  if(!U) return;
  await sb.from('notifications').update({lu:true}).eq('user_id',U.id).eq('lu',false);
  document.getElementById('notif-dot').style.display='none';
  document.getElementById('notif-dot').textContent='';
  // Rafraîchir le panneau
  await loadNotifs();
}

async function init(){
  const{data:sd,error:se}=await sb.auth.getSession();
  if(!sd?.session){window.location.href='silla-login.html';return;}
  U=sd.session.user;

  // Charger profil
  const{data:p}=await sb.from('utilisateurs').select('*').eq('id',U.id).maybeSingle();
  if(p){
    P=p;
  } else {
    // Créer le profil s'il n'existe pas encore
    const code='SLA-'+U.id.slice(0,6).toUpperCase();
    await sb.from('utilisateurs').upsert({
      id:U.id,
      nom:U.user_metadata?.full_name||'Membre',
      email:U.email,
      solde:1000,
      code_parrainage:code,
      statut:'actif',
      is_admin:false,
      created_at:new Date().toISOString()
    },{onConflict:'id'});
    const{data:pp}=await sb.from('utilisateurs').select('*').eq('id',U.id).maybeSingle();
    P=pp||{solde:1000,nom:'Membre'};
  }

  // Afficher
  const prenom=(P?.nom||'Membre').split(' ')[0];
  document.getElementById('tb-avatar').textContent=prenom[0]?.toUpperCase()||'M';
  document.getElementById('hero-solde').textContent=fmt(P?.solde||0)+' F';
  if((P?.solde||0)===1000&&!P?.bonus_utilise){
    document.getElementById('hero-bonus').style.display='block';
  }

  // Charger tout en parallèle
  await Promise.all([loadStats(), loadInvests(), loadNotifs()]);
}

async function loadStats(){
  try{
    const[r1,r2,r3]=await Promise.all([
      sb.from('investissements').select('id',{count:'exact',head:true}).eq('user_id',U.id).in('statut',['actif','gain_dispo']),
      sb.from('transactions').select('montant').eq('user_id',U.id).eq('type','gain'),
      sb.from('utilisateurs').select('id',{count:'exact',head:true}).eq('parrain_id',U.id),
    ]);
    document.getElementById('qs-invests').textContent=r1.count||0;
    const g=(r2.data||[]).reduce((s,t)=>s+(t.montant||0),0);
    document.getElementById('qs-gains').textContent=fmtK(g)+'F';
    document.getElementById('qs-filleuls').textContent=r3.count||0;
  }catch(e){
    document.getElementById('qs-invests').textContent='0';
    document.getElementById('qs-gains').textContent='0F';
    document.getElementById('qs-filleuls').textContent='0';
  }
}

async function loadInvests(){
  try{
    const{data}=await sb.from('investissements').select('*').eq('user_id',U.id).in('statut',['actif','gain_dispo']).order('created_at',{ascending:false}).limit(3);
    const el=document.getElementById('plans-list');
    if(!data?.length){
      el.innerHTML='<div class="empty"><span class="empty-ico">📈</span>Aucun plan actif — <a href="silla-plans.html" style="color:var(--gold);font-weight:700">Investir maintenant</a></div>';
      return;
    }
    const now=Date.now();
    el.innerHTML=data.map(inv=>{
      const fin=new Date(inv.date_fin).getTime();
      const deb=new Date(inv.created_at).getTime();
      const pct=fin>deb?Math.min(100,Math.round((now-deb)/(fin-deb)*100)):100;
      const dispo=inv.statut==='gain_dispo';
      const ico=inv.plan_type?.startsWith('r')?'⚡':inv.plan_type?.startsWith('prod')?'🔬':'💎';
      const nom=inv.plan_type?.toUpperCase()?.replace(/_/g,' ')||'Plan';
      return `<div class="plan-card">
        <div class="pc-ico">${ico}</div>
        <div class="pc-info">
          <div class="pc-name">${nom}</div>
          <div class="pc-sub">${fmt(inv.montant)} F · ${inv.duree_jours||'—'}j</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="pc-right">
          <div class="pc-gain">+${fmt(inv.gain_attendu||0)} F</div>
          <span class="pc-status ${dispo?'s-dispo':'s-actif'}">${dispo?'🔥 Dispo !':'En cours'}</span>
        </div>
      </div>`;
    }).join('');
  }catch(e){console.error('loadInvests',e);}
}

async function loadNotifs(){
  try{
    const{data}=await sb.from('notifications').select('*').eq('user_id',U.id).order('created_at',{ascending:false}).limit(20);
    const ndList=document.getElementById('nd-list');
    if(!data?.length){
      ndList.innerHTML='<div class="nd-empty"><span class="nd-empty-ico">🔔</span>Aucune notification</div>';
      return;
    }
    // Badge numérique non lues
    const unread=data.filter(n=>!n.lu).length;
    const dot=document.getElementById('notif-dot');
    if(unread>0){
      dot.style.display='block';
      dot.textContent=unread>9?'9+':unread>1?String(unread):'';
      // Style badge numérique si > 1
      if(unread>1){
        dot.style.cssText='display:flex;align-items:center;justify-content:center;position:absolute;top:-3px;right:-3px;min-width:17px;height:17px;padding:0 3px;border-radius:9px;background:var(--ember);color:#fff;font-size:.52rem;font-weight:900;border:2px solid var(--cream);font-family:Outfit,sans-serif;';
      }
    } else {
      dot.style.display='none';
    }
    const icons={gain:'💰',info:'📋',admin:'📣',bonus_inscription:'🎁',parrainage_gain:'👑',retrait:'💸',recharge:'💳'};
    const dt=d=>{
      const dd=new Date(d);
      const now=new Date();
      const diff=Math.floor((now-dd)/60000);
      if(diff<1) return 'À l'instant';
      if(diff<60) return diff+'min';
      if(diff<1440) return Math.floor(diff/60)+'h';
      return dd.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
    };
    ndList.innerHTML=data.map(n=>`
      <div class="nd-item${n.lu?'':' unread'}">
        <div class="nd-ico">${icons[n.type]||'🔔'}</div>
        <div class="nd-info">
          <div class="nd-name">
            ${n.titre||'Notification'}
            ${!n.lu?'<span class="nd-dot"></span>':''}
          </div>
          <div class="nd-msg">${n.message||''}</div>
          <div class="nd-time">${dt(n.created_at)}</div>
        </div>
      </div>`).join('');
  }catch(e){console.error('loadNotifs',e);}
}

init();
</script>
</body>
</html>
