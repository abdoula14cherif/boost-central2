<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SILLA — Support</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
:root{--cream:#FEFCF7;--warm:#FDF6E9;--card:#fff;--gold:#B8860B;--gold-l:#D4A017;--gold-ll:#E8C060;--gold-dim:rgba(184,134,11,.08);--ember:#E05A2B;--green:#16A34A;--blue:#1A3FE3;--ink:#2D1F00;--brown:#6B4C1E;--muted:#9A8060;--border:rgba(184,134,11,.15);--shadow:rgba(90,50,0,.09);--nav:66px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--cream);}
body{max-width:430px;margin:0 auto;font-family:'Outfit',sans-serif;color:var(--ink);display:flex;flex-direction:column;height:100dvh;overflow:hidden;}

/* TOPBAR */
.topbar{background:rgba(254,252,247,.97);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;backdrop-filter:blur(12px);}
.back{width:34px;height:34px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--ink);font-size:1rem;}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;flex:1;}
.tb-status{display:flex;align-items:center;gap:.35rem;font-size:.62rem;color:var(--muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:#ccc;}
.status-dot.online{background:var(--green);box-shadow:0 0 0 2px rgba(22,163,74,.2);}

/* MESSAGES AREA */
.messages-area{flex:1;overflow-y:auto;padding:.9rem;display:flex;flex-direction:column;gap:.5rem;background:var(--warm);}
.messages-area::-webkit-scrollbar{width:3px;}
.messages-area::-webkit-scrollbar-thumb{background:rgba(184,134,11,.15);border-radius:99px;}

.msg-row{display:flex;gap:.5rem;animation:msgIn .22s ease both;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.msg-row.admin-msg{flex-direction:row-reverse;}

.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;flex-shrink:0;align-self:flex-end;}
.av-admin{background:linear-gradient(135deg,#1A3FE3,#2D55FF);color:#fff;}
.av-user{background:linear-gradient(135deg,var(--gold),var(--gold-ll));color:#fff;}

.bubble{max-width:80%;padding:.65rem .85rem;border-radius:16px;font-size:.8rem;line-height:1.6;position:relative;}
.msg-row.user-msg .bubble{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;border-radius:16px 4px 16px 16px;}
.msg-row.admin-msg .bubble{background:var(--card);border:1px solid var(--border);border-radius:4px 16px 16px 16px;color:var(--ink);}
.msg-time{font-size:.55rem;margin-top:.28rem;display:block;opacity:.55;font-family:'DM Mono',monospace;}
.msg-row.user-msg .msg-time{text-align:right;}

.msg-date-sep{text-align:center;font-family:'DM Mono',monospace;font-size:.55rem;color:var(--muted);padding:.35rem 0;letter-spacing:.08em;text-transform:uppercase;}

/* WELCOME CARD */
.welcome-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.1rem;margin:.5rem 0;text-align:center;box-shadow:0 2px 10px var(--shadow);}
.wc-ico{font-size:1.8rem;margin-bottom:.45rem;}
.wc-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:.3rem;}
.wc-sub{font-size:.72rem;color:var(--muted);line-height:1.65;}

/* SUGGESTIONS */
.suggestions{padding:.5rem .9rem .4rem;border-top:1px solid var(--border);background:rgba(254,252,247,.9);display:flex;gap:.4rem;overflow-x:auto;flex-shrink:0;}
.suggestions::-webkit-scrollbar{display:none;}
.sug{padding:.38rem .75rem;border-radius:20px;border:1px solid var(--border);background:var(--warm);font-size:.65rem;font-weight:600;color:var(--brown);cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.sug:hover{background:var(--gold-dim);border-color:rgba(184,134,11,.35);color:var(--gold);}

/* REPLY BAR */
.reply-bar{background:rgba(254,252,247,.98);border-top:1px solid var(--border);padding:.65rem .85rem;display:flex;gap:.55rem;align-items:flex-end;flex-shrink:0;}
.reply-inp{flex:1;background:var(--warm);border:1.5px solid var(--border);border-radius:14px;padding:.65rem .9rem;font-family:'Outfit',sans-serif;font-size:.82rem;color:var(--ink);outline:none;resize:none;max-height:100px;line-height:1.5;transition:border-color .2s;}
.reply-inp::placeholder{color:rgba(45,31,0,.25);}
.reply-inp:focus{border-color:rgba(184,134,11,.5);background:#fff;}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-l));border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;box-shadow:0 3px 10px rgba(184,134,11,.3);}
.send-btn:hover{transform:scale(1.08);}
.send-btn:active{transform:scale(.93);}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.send-btn svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}

/* NAV */
.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--nav);background:rgba(254,252,247,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;align-items:center;z-index:90;box-shadow:0 -4px 20px var(--shadow);}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;padding:8px 4px;text-decoration:none;border:none;background:none;cursor:pointer;}
.bn-ico{font-size:1.2rem;}.bn-lbl{font-size:.55rem;font-weight:700;color:var(--muted);}
.bn.active .bn-lbl{color:var(--gold);}
.bn-center{width:52px;height:52px;border-radius:50%;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--gold-ll));display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 16px rgba(184,134,11,.35);border:none;cursor:pointer;}

/* LOADER */
.loader{display:flex;align-items:center;justify-content:center;padding:2rem;gap:.5rem;color:var(--muted);font-size:.75rem;}
.spin{width:13px;height:13px;border:2px solid rgba(184,134,11,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
#toast{position:fixed;top:62px;left:50%;transform:translateX(-50%) translateY(-14px);background:#fff;border:1.5px solid var(--border);border-radius:4px;padding:.65rem 1.1rem;font-size:.75rem;font-weight:600;color:var(--ink);z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 24px var(--shadow);pointer-events:none;opacity:0;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.ok{border-color:rgba(22,163,74,.4);color:var(--green);}
#toast.err{border-color:rgba(224,90,43,.4);color:var(--ember);}
</style>
</head>
<body>

<div class="topbar">
  <a class="back" href="silla-dashboard.html">←</a>
  <div class="tb-title">💬 Support SILLA</div>
  <div class="tb-status">
    <div class="status-dot online" id="status-dot"></div>
    <span id="status-txt">En ligne</span>
  </div>
</div>

<div id="toast"></div>

<div class="messages-area" id="messages-area">
  <div class="loader"><div class="spin"></div></div>
</div>

<div class="suggestions" id="suggestions">
  <div class="sug" onclick="useSug(this)">Ma recharge n'est pas créditée</div>
  <div class="sug" onclick="useSug(this)">Mon retrait tarde</div>
  <div class="sug" onclick="useSug(this)">Je n'arrive pas à me connecter</div>
  <div class="sug" onclick="useSug(this)">Comment investir ?</div>
  <div class="sug" onclick="useSug(this)">Problème avec mon solde</div>
  <div class="sug" onclick="useSug(this)">Comment parrainer un ami ?</div>
</div>

<div class="reply-bar">
  <textarea class="reply-inp" id="reply-inp" placeholder="Écrire un message…" rows="1"
    oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();envoyerMessage();}"></textarea>
  <button class="send-btn" id="send-btn" onclick="envoyerMessage()">
    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const sb = supabase.createClient(
  'https://pnybmieunidegpxwkodn.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBueWJtaWV1bmlkZWdweHdrb2RuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NzQxNjcsImV4cCI6MjA5MjE1MDE2N30.nB7sZDP5_ObxvW112LlrhS788_xdUoAVFnsFmPrXUsY'
);

let U = null, P = null, convId = null;

const fhour = d => new Date(d).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const fday  = d => new Date(d).toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long'});

function escHtml(str){return(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');}

let _tt;
function toast(m, t='') {
  const el = document.getElementById('toast');
  el.textContent = m; el.className = 'toast show'+(t?' '+t:'');
  clearTimeout(_tt); _tt = setTimeout(() => el.className='toast',4000);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function useSug(el) {
  const inp = document.getElementById('reply-inp');
  inp.value = el.textContent.trim();
  inp.focus(); autoResize(inp);
}

// ── OBTENIR OU CRÉER LA CONVERSATION ──
async function getOrCreateConversation() {
  // Chercher une conversation existante
  const { data: existing } = await sb
    .from('support_conversations')
    .select('id, statut')
    .eq('user_id', U.id)
    .maybeSingle();

  if (existing) { convId = existing.id; return existing; }

  // Créer une nouvelle conversation
  const { data: created, error } = await sb
    .from('support_conversations')
    .insert({
      user_id:           U.id,
      dernier_message:   '',
      derniere_activite: new Date().toISOString(),
      non_lus_admin:     0,
      statut:            'ouvert'
    })
    .select()
    .single();

  if (error) { console.error('create conv error:', error); return null; }
  convId = created.id;
  return created;
}

// ── CHARGER MESSAGES ──
async function chargerMessages() {
  const area = document.getElementById('messages-area');

  if (!convId) {
    area.innerHTML = `<div class="welcome-card">
      <div class="wc-ico">💬</div>
      <div class="wc-title">Support SILLA</div>
      <div class="wc-sub">Notre équipe est disponible pour vous aider.<br/>Envoyez votre premier message ci-dessous.</div>
    </div>`;
    return;
  }

  area.innerHTML = '<div class="loader"><div class="spin"></div></div>';

  const { data, error } = await sb
    .from('support_messages')
    .select('*')
    .eq('conversation_id', convId)
    .order('created_at', { ascending: true });

  if (error) { area.innerHTML = `<div class="loader" style="color:var(--ember)">Erreur chargement</div>`; return; }

  if (!data?.length) {
    area.innerHTML = `<div class="welcome-card">
      <div class="wc-ico">💬</div>
      <div class="wc-title">Support SILLA</div>
      <div class="wc-sub">Notre équipe est là pour vous aider.<br/>Décrivez votre problème et nous répondrons rapidement.</div>
    </div>`;
    return;
  }

  let html = '';
  let lastDay = '';
  data.forEach(m => {
    const day = fday(m.created_at);
    if (day !== lastDay) { html += `<div class="msg-date-sep">${day}</div>`; lastDay = day; }
    const isMe = m.sender === 'user';
    html += `<div class="msg-row ${isMe ? 'user-msg' : 'admin-msg'}">
      <div class="msg-av ${isMe ? 'av-user' : 'av-admin'}">${isMe ? (P?.nom||'?')[0].toUpperCase() : '🔑'}</div>
      <div class="bubble">
        ${escHtml(m.message)}
        <span class="msg-time">${fhour(m.created_at)}</span>
      </div>
    </div>`;
  });

  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

// ── ENVOYER MESSAGE ──
async function envoyerMessage() {
  const inp = document.getElementById('reply-inp');
  const msg = inp.value.trim();
  if (!msg) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true; inp.disabled = true;

  // Créer la conversation si elle n'existe pas
  if (!convId) await getOrCreateConversation();
  if (!convId) {
    toast('Erreur de connexion', 'err');
    btn.disabled = false; inp.disabled = false;
    return;
  }

  const now = new Date().toISOString();
  const { error } = await sb.from('support_messages').insert({
    conversation_id: convId,
    user_id:         U.id,
    sender:          'user',
    message:         msg,
    lu:              false,
    created_at:      now
  });

  if (error) {
    toast('❌ Erreur: ' + error.message, 'err');
    btn.disabled = false; inp.disabled = false;
    return;
  }

  // Mettre à jour la conversation
  const preview = msg.length > 60 ? msg.slice(0,60)+'…' : msg;
  await sb.from('support_conversations').update({
    dernier_message:   preview,
    derniere_activite: now,
    statut:            'ouvert',
    non_lus_admin:     sb.rpc ? undefined : 1  // incrémenté côté admin
  }).eq('id', convId);

  // Incrémenter non_lus_admin via RPC ou update direct
  await sb.rpc('increment_non_lus_admin', { conv_id: convId })
    .then(() => {})
    .catch(() => {
      // Fallback : récupérer la valeur actuelle et incrementer
      sb.from('support_conversations').select('non_lus_admin').eq('id', convId).single()
        .then(({ data: c }) => {
          sb.from('support_conversations')
            .update({ non_lus_admin: (c?.non_lus_admin||0)+1 })
            .eq('id', convId).then(() => {});
        });
    });

  // Notifier l'admin
  sb.from('utilisateurs').select('id').eq('email','abdoula13cherif@gmail.com').maybeSingle()
    .then(({ data: adm }) => {
      if (adm) sb.from('notifications').insert({
        user_id: adm.id,
        titre:   `💬 Message de ${P?.nom||'un utilisateur'}`,
        message: preview,
        type:    'admin'
      }).then(() => {}).catch(() => {});
    });

  inp.value = '';
  inp.style.height = 'auto';
  btn.disabled = false; inp.disabled = false;
  inp.focus();

  // Cacher les suggestions après le premier envoi
  document.getElementById('suggestions').style.display = 'none';
}

// ── TEMPS RÉEL ──
function abonner() {
  if (!convId) return;
  sb.channel('support-user-' + convId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'support_messages',
      filter: `conversation_id=eq.${convId}`
    }, payload => {
      // Ajouter le message en temps réel
      const m = payload.new;
      const area = document.getElementById('messages-area');
      const welcomeCard = area.querySelector('.welcome-card');
      if (welcomeCard) welcomeCard.remove();

      const isMe = m.sender === 'user';
      const div = document.createElement('div');
      div.innerHTML = `<div class="msg-row ${isMe ? 'user-msg' : 'admin-msg'}">
        <div class="msg-av ${isMe ? 'av-user' : 'av-admin'}">${isMe ? (P?.nom||'?')[0].toUpperCase() : '🔑'}</div>
        <div class="bubble">
          ${escHtml(m.message)}
          <span class="msg-time">${fhour(m.created_at)}</span>
        </div>
      </div>`;
      area.appendChild(div.firstElementChild);
      area.scrollTop = area.scrollHeight;

      if (!isMe) toast('💬 Réponse du support reçue', 'ok');
    })
    .subscribe();
}

// ── INIT ──
async function init() {
  const { data } = await sb.auth.getSession();
  if (!data?.session) { window.location.href = 'silla-login.html'; return; }
  U = data.session.user;

  const { data: p } = await sb.from('utilisateurs').select('*').eq('id', U.id).maybeSingle();
  P = p;

  const conv = await getOrCreateConversation();
  await chargerMessages();
  abonner();
}

init();
</script>
</body>
</html>
